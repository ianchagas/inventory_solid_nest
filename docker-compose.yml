version: '3.7'

services:
  database:
    image: postgres
    container_name: InventoryDB
    restart: always
    ports:
      - 5434:5432
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=inventory
    volumes:
      - pgdata:/data/postgres
    networks:
      - inventory

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: Inventory
    ports:
      - 3000:3000
    volumes:
      - .:/app
    links:
      - database
    networks:
      - inventory
    depends_on:
      - database
volumes:
  pgdata:
    driver: local
networks:
  inventory:
